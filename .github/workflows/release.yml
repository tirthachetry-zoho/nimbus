name: Release

# Manually triggered release pipeline. Builds the Tauri app for macOS, Windows and
# Linux and publishes the installable binaries (tagged with the release version) to a
# GitHub Release via tauri-action.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.0.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version from release tag
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          node -e '
            const fs = require("fs");
            const v = process.argv[1];
            const cfg = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
            cfg.version = v;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(cfg, null, 2) + "\n");
            const cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            fs.writeFileSync("src-tauri/Cargo.toml", cargo.replace(/^version = ".*"$/m, "version = \"" + v + "\""));
            console.log("Set app version to", v);
          ' "$VERSION"

      - name: Build and publish with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseName: "Nimbus ${{ github.event.inputs.tag }}"
          releaseBody: "Installers for Linux (.deb/.rpm/AppImage), macOS (.dmg, universal) and Windows (.msi/.exe). Version ${{ github.event.inputs.tag }}."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
